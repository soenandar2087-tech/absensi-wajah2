<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>
    <video id="video" width="400" autoplay muted playsinline></video><br>
    <input type="text" id="name" placeholder="Nama Karyawan">
    <button onclick="sendAction('register')">1. Daftar</button>
    <button onclick="sendAction('scan')">2. Scan Absensi</button>
    <h2 id="result">Siap...</h2>

    <script>
        const video = document.getElementById('video');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw9o2R1Cd38rYTl-k4f5H2z3q6hVwM4B0faN-ik2JlaGHtZk0wa1xJZiHuvlXdc32z_/exec"; // PASTI GANTI INI!

        async function init() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        async function sendAction(action) {
            document.getElementById('result').innerText = "Memproses...";
            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (!det) { alert("Wajah tidak terlihat!"); return; }

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: action, id: document.getElementById('name').value, descriptor: Array.from(det.descriptor) })
            }).then(() => {
                if(action === 'scan') fetch(GAS_URL).then(res => res.text()).then(txt => document.getElementById('result').innerText = "Halo: " + txt);
                else alert("Data tersimpan!");
            });
        }
        init();
    </script>
</body>
</html>

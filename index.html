<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        #video { width: 320px; height: 240px; border-radius: 10px; background: #333; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .controls { margin-top: 15px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; margin: 5px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h2>Sistem Absensi Wajah</h2>
    <video id="video" autoplay muted playsinline></video><br>
    <input type="text" id="name" placeholder="Nama Karyawan" style="padding: 8px; width: 250px;">
    
    <div class="controls">
        <button onclick="sendAction('register')">1. Daftar Wajah</button>
        <button onclick="sendAction('scan')">2. Scan Absensi</button>
    </div>
    
    <h2 id="result">Menunggu...</h2>

    <script>
        const video = document.getElementById('video');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxuSG_qp2yfxtgjPkL5YAbV2dorMMpguZKb7V5FP2nK0EWqwqGVO_dYCK9_Uwi5uYEL/exec";

        async function init() {
            const resEl = document.getElementById('result');
            try {
                resEl.innerText = "Memuat AI...";
                // Pastikan path model sesuai dengan yang disediakan vladmandic
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                resEl.innerText = "Siap digunakan!";
            } catch (err) {
                resEl.innerText = "Error: " + err.message;
            }
        }

        async function scanAbsensi() {
    status.innerText = "Memproses...";
    const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                             .withFaceLandmarks()
                             .withFaceDescriptor();

    if (!det) { status.innerText = "Wajah tidak ditemukan!"; return; }

    try {
        // 1. Kirim data wajah (POST)
        const response = await fetch(GAS_URL, {
            method: 'POST',
            mode: 'cors', // SANGAT PENTING
            headers: { 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
                action: 'scan',
                descriptor: Array.from(det.descriptor)
            })
        });

        // 2. Ambil hasilnya (GET)
        status.innerText = "Sedang mencocokkan...";
        const responseGet = await fetch(GAS_URL, { 
            method: 'GET',
            mode: 'cors' 
        });
        const data = await responseGet.json();
        status.innerText = "Halo: " + data.nama;
        
    } catch (err) {
        status.innerText = "Error: " + err.message;
        console.error(err); // Lihat error detail di console (F12)
    }
}
        
        // Jalankan inisialisasi
        init();
    </script>
</body>
</html>

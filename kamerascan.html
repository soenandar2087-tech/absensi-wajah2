<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #video { width: 100%; max-width: 400px; border: 5px solid #333; background: #000; }
    </style>
</head>
<body>
    <h2>Sistem Absensi Wajah</h2>
    <video id="video" autoplay muted playsinline></video>
    <p id="status">Memuat AI Model...</p>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function init() {
            try {
                // 1. Load Model AI
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                
                // 2. Akses Kamera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.innerText = "Kamera Aktif! Mendeteksi...";

                // 3. Deteksi Wajah
                video.addEventListener('play', () => {
                    setInterval(async () => {
                        const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                        if (det) {
                            status.innerText = "Wajah Terdeteksi! (Skor: " + Math.round(det.score * 100) + "%)";
                        } else {
                            status.innerText = "Mencari wajah...";
                        }
                    }, 1000);
                });
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
